<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- AOS 动画库 -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        dark: '#1F2937',
                    }
                }
            }
        }
    </script>
    <style>
        /* 背景切换过渡 */
        body {transition: background-image 1s ease-in-out;}
        /* 桌面端/移动端背景图（替换为你的实际背景图路径） */
        .desktop-bg{background-image:url('background/-ivealive.png');}
        .mobile-bg{background-image:url('background/03.png');}
        /* 卡片悬浮效果 */
        .profile-card{transition:all 0.3s ease;}
        .profile-card:hover{transform:translateY(-5px);box-shadow:0 20px 25px -5px rgba(0,0,0,0.2);}
        /* 背景渐变遮罩 */
        .bg-gradient-overlay{background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.7));}
        /* 头像图片适配：防止拉伸，居中显示 */
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 图片铺满容器且不变形 */
            object-position: center; /* 图片居中 */
        }
    </style>
</head>
<body class="bg-cover bg-center bg-fixed min-h-screen flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-gradient-overlay z-0"></div>

    <!-- 侧边栏 -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white/90 backdrop-blur shadow-lg -translate-x-full transition-all duration-300 z-40">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <!-- 侧边栏头像：替换为图片（相对路径 picture/avatar.png） -->
                <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-primary">
                    <img src="avatar/avatar.jpg" alt="侧边栏头像" class="avatar-img">
                </div>
                <button id="closeSidebar" class="text-gray-500 text-xl"><i class="fa fa-times"></i></button>
            </div>
            <nav>
                <ul class="space-y-4">
                    <li><a href="index.html" class="sidebar-link flex items-center p-3 rounded-lg text-gray-700 hover:bg-primary hover:text-white"><i class="fa fa-home w-6"></i><span>首页</span></a></li>
                    <li><a href="contact.html" class="sidebar-link flex items-center p-3 rounded-lg text-gray-700 hover:bg-primary hover:text-white"><i class="fa fa-user w-6"></i><span>联系我</span></a></li>
                    <li><a href="zp.html" class="sidebar-link flex items-center p-3 rounded-lg text-gray-700 hover:bg-primary hover:text-white"><i class="fa fa-folder w-6"></i><span>作品集</span></a></li>
                    <li><a href="skill.html" class="sidebar-link flex items-center p-3 rounded-lg text-gray-700 hover:bg-primary hover:text-white"><i class="fa fa-code w-6"></i><span>技能</span></a></li>
                    <li><a href="#blog" class="sidebar-link flex items-center p-3 rounded-lg text-gray-700 hover:bg-primary hover:text-white"><i class="fa fa-pencil w-6"></i><span>博客【暂无】</span></a></li>
                </ul>
            </nav>
        </div>
    </div>
    
    <!-- 侧边栏遮罩 -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden"></div>
    
    <!-- 菜单按钮 -->
    <button id="menuBtn" class="fixed top-4 left-4 z-50 w-12 h-12 rounded-full bg-white/90 shadow-lg flex items-center justify-center text-gray-700">
        <i class="fa fa-bars text-xl"></i>
    </button>

    <!-- 主卡片 -->
    <div class="relative z-10 w-full max-w-md">
        <div class="profile-card bg-white/90 backdrop-blur rounded-2xl shadow-xl overflow-hidden pt-20" data-aos="fade-up">
            <!-- 主页面头像：替换为图片（相对路径 picture/avatar.png） -->
            <div class="relative flex justify-center">
                <div class="w-32 h-32 rounded-full border-4 border-white shadow-lg overflow-hidden">
                    <img src="avatar/avatar.jpg" alt="个人头像" class="avatar-img">
                </div>
            </div>

            <div class="pt-8 pb-8 px-6 text-center">
                <h1 class="text-3xl font-bold text-dark mb-2">蔚蓝侠客</h1>
                <p class="text-lg text-gray-600 mb-4">蔚蓝档案国服开服玩家 我的世界玩家</p>
                <div class="w-20 h-1 bg-primary mx-auto my-4 rounded-full"></div>
                <p class="text-gray-700">
                    喜欢做我自己想做的事的鸽子
                    有时候总有新想法冒出，但多数没落实
                </p>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化AOS动画（允许多次触发）
        AOS.init({
            once: false,        // 关闭“只触发一次”，支持窗口切换后重放
            duration: 800,      // 动画时长
            easing: 'ease-in-out'
        });

        // 2. 修复背景切换逻辑（避免类叠加）
        function setBackground(){
            const body = document.body;
            // 先移除所有背景类，再添加目标类
            body.classList.remove('desktop-bg', 'mobile-bg');
            if (window.innerWidth >= 768) {
                body.classList.add('desktop-bg');
            } else {
                body.classList.add('mobile-bg');
            }
            // 刷新动画状态
            AOS.refresh();
        }

        // 初始加载背景
        setBackground();

        // 3. 窗口resize防抖+动画刷新
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                setBackground();
                AOS.refreshHard(); // 强制刷新动画（解决切回电脑端不播放问题）
            }, 100);
        });

        // 4. 侧边栏交互逻辑
        const sidebar = document.getElementById('sidebar'),
              overlay = document.getElementById('sidebarOverlay'),
              menuBtn = document.getElementById('menuBtn'),
              closeBtn = document.getElementById('closeSidebar'),
              links = document.querySelectorAll('.sidebar-link');

        function openSide(){
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
            menuBtn.classList.add('hidden');
        }
        function closeSide(){
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
            menuBtn.classList.remove('hidden');
        }
        menuBtn.onclick = openSide;
        closeBtn.onclick = closeSide;
        overlay.onclick = closeSide;
        links.forEach(item => item.onclick = closeSide);
        document.onkeydown = e => e.key === 'Escape' && closeSide();
    </script>
</body>
</html>
